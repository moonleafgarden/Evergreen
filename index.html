<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evergreen</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ========================= -->
<!-- Welcome -->
<!-- ========================= -->

<section id="welcome" class="screen active">

    <div class="leaf leaf1">🍃</div>
    <div class="leaf leaf2">🌿</div>
    <div class="leaf leaf3">🍀</div>

    <div class="welcome-box">

        <div class="logo-circle">
            🌲
        </div>

        <h1>Evergreen</h1>

        <h3>
            Grow a little every day.
        </h3>

        <p>
            A peaceful place where your goals grow,
            habits bloom, and every small step matters.
        </p>


        <div class="mini-cards">

            <div>
                📚
                <span>Learn</span>
            </div>

            <div>
                🌱
                <span>Grow</span>
            </div>

            <div>
                ✨
                <span>Shine</span>
            </div>

        </div>


        <button id="nextBtn">
            🌱 Start Growing
        </button>


    </div>

</section>
<!-- ========================= -->
<!-- Interests -->
<!-- ========================= -->

<section id="interests" class="screen">

    <div class="top">

        <h2>
            Choose your interests
        </h2>

        <p>
            Pick at least 5 things you enjoy.
        </p>

        <input
            id="search"
            type="text"
            placeholder="Search..."
        >

    </div>

    <div id="interestContainer">

    </div>

    <div class="bottom">

        <p id="selectedCount">
            Selected: 0
        </p>

        <button id="continueBtn">
            Continue
        </button>

    </div>

</section>

<!-- ========================= -->
<!-- Home -->
<!-- ========================= -->

<section id="home" class="screen">

<header>

<h1>🌲 Evergreen</h1>

<p>Grow every day.</p>

</header>

<main>

<div class="progress-card">

<h2>Today's Progress</h2>

<div class="progress-bar">

<div class="progress-fill"></div>

</div>

<p id="progressText">

0 / 0 completed

</p>

</div>

<div id="habitContainer">

</div>

</main>

</section>

<script src="interests.js"></script>
<script src="habits.js"></script>
<script src="app.js"></script>
</body>
</html>
