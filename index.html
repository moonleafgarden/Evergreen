<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>🌲 Evergreen</h1>
        <p>A peaceful place where you grow.</p>
    </header>

    <main>

        <section class="progress">
            <h2>Today's Progress</h2>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <p>0 / 8 completed</p>
        </section>

        <section class="habits">

            <div class="habit">
                <span>📖 Reading</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>🇬🇧 English</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>➗ Math</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>💻 Project</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>🏃 Sport</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>🌍 Explore</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>🏠 Home</span>
                <button>Done</button>
            </div>

            <div class="habit">
                <span>💖 Self-care</span>
                <button>Done</button>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
